site_name: Star Atlas Lore Wiki
site_description: Official Star Atlas Lore Encyclopedia — factions, species, history, and more (Alpha)
site_url: https://joseeduardonoot.github.io/star-atlas-lore/
repo_url: https://github.com/JoseEduardonoot/star-atlas-lore
repo_name: star-atlas-lore

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/star-shooting
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.tooltips
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JoseEduardonoot/star-atlas-lore
  generator: false

copyright: >
  ⚠️ Alpha Version — This wiki is under active development. Content is being refined and may change.
  Star Atlas is a trademark of ATMTA, Inc.

